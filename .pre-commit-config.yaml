repos:
  - repo: local
    hooks:
      - id: validate-subagent-frontmatter
        name: "Subagent Frontmatter バリデーション"
        entry: python scripts/validate_subagents.py
        language: python
        files: ^agents/agents/.*/agent\.md$
        additional_dependencies:
          - pyyaml>=6.0
          - pydantic>=2.13
        pass_filenames: true
        description: "Claude Code subagent の YAML frontmatter が pydantic スキーマに準拠しているか検証する"

      - id: validate-managed-agent-config
        name: "Managed Agents config.json バリデーション"
        entry: python scripts/validate-config.py
        language: python
        files: ^agents/agents/.*/config\.json$
        additional_dependencies:
          - pyyaml>=6.0
          - pydantic>=2.13
        pass_filenames: false
        description: "Managed Agents API の config.json が pydantic スキーマに準拠し agent.md と整合しているか検証する"

      - id: verify-subagent-manifest
        name: "Subagent マニフェスト検証（HMAC署名）"
        entry: python scripts/manifest.py verify-staged
        language: python
        files: ^agents/agents/.*/agent\.md$
        pass_filenames: false
        description: "新規 subagent が create-subagent.sh 経由で作成されたか HMAC 署名で検証する"

      - id: validate-duet
        name: "Actor-Critic Duet バリデーション"
        entry: python scripts/validate-duet.py
        language: python
        files: ^agents/duets/.*/duet\.json$
        additional_dependencies:
          - pyyaml>=6.0
          - pydantic>=2.13
        pass_filenames: false
        description: "duet.json が pydantic スキーマに準拠し、参照先エージェントが正しく登録されているか検証する"
